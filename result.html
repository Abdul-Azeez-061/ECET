<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Result</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="max-width:520px; margin:0 auto; padding:2rem 1rem 4rem;">

        <div class="page-container">
            <div class="page-header">
                <h1>Quiz Complete!</h1>
                <p id="subject-name">Loading...</p>
            </div>

            <div class="page-body">
                <div class="score-display">
                    <span class="score-number" id="score-text">—</span>
                    <div class="score-label">Your Score</div>
                    <div id="score-badge"></div>
                </div>

                <div class="result-form">
                    <label for="user-name">Save your score to the Leaderboard</label>
                    <input type="text" id="user-name" class="name-input" placeholder="Enter your name" autocomplete="off">
                    <button id="save-btn" class="btn primary-btn">
                        Save to Leaderboard
                        <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                    </button>
                </div>

                <a href="index.html" class="btn secondary-btn">← Try Another Subject</a>
            </div>
        </div>

    </div>
    <script src="result.js"></script>
</body>
</html>
