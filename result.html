<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Result</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="site-nav">
        <div class="site-nav-inner">
            <a href="index.html" class="site-nav-logo">ECET <span>2026</span></a>
            <div class="site-nav-links">
                <a href="index.html" class="nav-link">
                    <svg viewBox="0 0 20 20" fill="currentColor" width="15" height="15"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h4a1 1 0 001-1v-3h2v3a1 1 0 001 1h4a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
                    <span>Home</span>
                </a>
                <a href="leaderboard.html" class="nav-link">
                    <svg viewBox="0 0 20 20" fill="currentColor" width="15" height="15"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                    <span>Leaderboard</span>
                </a>
            </div>
        </div>
    </nav>

    <div style="max-width:720px; margin:0 auto; padding:2rem 1rem 4rem;">
 
        <div class="page-container">
            <div class="page-header">
                <h1>Quiz Complete!</h1>
                <p id="subject-name">Loading...</p>
            </div>
 
            <div class="page-body">
 
                <!-- Score -->
                <div class="score-display">
                    <span class="score-number" id="score-text">—</span>
                    <div class="score-label">Your Score</div>
                    <div id="score-badge"></div>
                </div>
 
                <!-- Save to leaderboard -->
                <div class="result-form">
                    <label for="user-name">Save your score to the Leaderboard</label>
                    <input type="text" id="user-name" class="name-input" placeholder="Enter your name" autocomplete="off">
                    <button id="save-btn" class="btn primary-btn">
                        Save to Leaderboard
                        <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                    </button>
                </div>
 
                <!-- Answer Key -->
                <div style="margin-top:2.5rem; border-top:2px dashed var(--gray-200); padding-top:2rem;">
                    <h2 style="font-family:'Syne',sans-serif; font-size:1.15rem; font-weight:700; color:var(--navy-800); margin-bottom:1.25rem;">
                        Answer Key
                    </h2>
 
                    <!-- Summary pills -->
                    <div id="answer-key-summary" style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:1.25rem;"></div>
 
                    <!-- Filter tabs -->
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="all">All</button>
                        <button class="tab-btn" data-tab="correct">✓ Correct</button>
                        <button class="tab-btn" data-tab="wrong">✗ Wrong</button>
                        <button class="tab-btn" data-tab="skipped">— Skipped</button>
                    </div>
 
                    <div id="answer-key-content"></div>
                </div>
 
                <a href="index.html" class="btn secondary-btn" style="margin-top:1.5rem;">← Try Another Subject</a>
 
            </div>
        </div>
 
    </div>
    <script src="result.js"></script>
</body>
</html>
