<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECET Leaderboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="site-nav">
        <div class="site-nav-inner">
            <a href="index.html" class="site-nav-logo">ECET <span>2026</span></a>
            <div class="site-nav-links">
                <a href="index.html" class="nav-link">
                    <svg viewBox="0 0 20 20" fill="currentColor" width="15" height="15"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h4a1 1 0 001-1v-3h2v3a1 1 0 001 1h4a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
                    <span>Home</span>
                </a>
                <a href="leaderboard.html" class="nav-link active">
                    <svg viewBox="0 0 20 20" fill="currentColor" width="15" height="15"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                    <span>Leaderboard</span>
                </a>
            </div>
        </div>
    </nav>

    <div style="max-width:860px; margin:0 auto; padding:2rem 1rem 4rem;">
        <div class="page-container">
            <div class="page-header">
                <h1>Leaderboard</h1>
                <p>Click any row to view a full performance analysis.</p>
            </div>
            <div class="page-body">
                <!-- Filter chips -->
                <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:1.25rem;">
                    <button class="tab-btn active" data-filter="all">All Subjects</button>
                    <button class="tab-btn" data-filter="ds">Data Structures</button>
                    <button class="tab-btn" data-filter="cn">Computer Networks</button>
                    <button class="tab-btn" data-filter="os">Operating Systems</button>
                    <button class="tab-btn" data-filter="se">Software Engineering</button>
                    <button class="tab-btn" data-filter="java">Java Programming</button>
                    <button class="tab-btn" data-filter="wt">Web Technology</button>
                    <button class="tab-btn" data-filter="de">Digital Electronics</button>
                    <button class="tab-btn" data-filter="dbms">DBMS</button>
                    <button class="tab-btn" data-filter="iot">Internet of Things</button>
                    <button class="tab-btn" data-filter="bd">Big Data</button>
                    <button class="tab-btn" data-filter="py">Python Programming</button>
                    <button class="tab-btn" data-filter="ap">Android Programming</button>
                </div>

                <div class="table-scroll">
                    <table id="leaderboard-table">
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Name</th>
                                <th>Subject</th>
                                <th>Score</th>
                                <th>%</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body"></tbody>
                    </table>
                </div>

                <!-- Analysis Section -->
                <div id="analysis-section" class="analysis-wrapper">
                    <h2 id="analysis-title">Performance Analysis</h2>
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="correct">✓ Correct</button>
                        <button class="tab-btn" data-tab="wrong">✗ Wrong</button>
                        <button class="tab-btn" data-tab="not-answered">— Skipped</button>
                    </div>
                    <div id="analysis-content"></div>
                </div>

                <div style="display:flex; gap:1rem; margin-top:2rem; flex-wrap:wrap;">
                    <a href="index.html" class="btn primary-btn" style="flex:1; min-width:180px;">← Take Another Test</a>
                    <button id="clear-btn" class="btn secondary-btn" style="flex:1; min-width:160px;">Clear All Data</button>
                </div>
            </div>
        </div>
    </div>
    <script src="leaderboard.js"></script>
</body>
</html>
